services:
  zimi:
    build: .
    container_name: zimi
    restart: unless-stopped
    # Host networking lets mDNS LAN peer discovery (_zimi._tcp) and BT
    # seeding (6881 TCP+UDP) work without manual port plumbing. See
    # docs/deployment-networking.md for tradeoffs and alternatives.
    network_mode: host
    volumes:
      - ./zims:/zims
      - ./zimi-config:/config
    environment:
      - ZIM_DIR=/zims
      - ZIMI_DATA_DIR=/config
      - ZIMI_MANAGE=1
      - ZIMI_TORRENT=1
