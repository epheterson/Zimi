name: Post-Publish

# Triggered when a draft release is manually published.
# Updates the Sparkle appcast, Homebrew cask, and publishes to PyPI.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build twine
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # NOTE: Appcast signing + Homebrew cask update are handled in desktop-release.yml
  # (which has RELEASE_TOKEN to bypass branch protection). Removed from here to avoid
  # duplicate pushes and branch protection failures.

  publish-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Download Snap from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh release download "$VERSION" --repo epheterson/Zimi --pattern "*.snap" || true
          SNAP_FILE=$(ls *.snap 2>/dev/null | head -1)
          if [ -z "$SNAP_FILE" ]; then
            echo "No snap found in release $VERSION — skipping publish"
            echo "SNAP_FOUND=false" >> $GITHUB_ENV
          else
            echo "Found: $SNAP_FILE"
            echo "SNAP_FOUND=true" >> $GITHUB_ENV
            echo "SNAP_FILE=$SNAP_FILE" >> $GITHUB_ENV
          fi

      - name: Publish to Snap Store
        if: env.SNAP_FOUND == 'true'
        uses: snapcore/action-publish@v1
        with:
          snap: ${{ env.SNAP_FILE }}
          release: stable
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
